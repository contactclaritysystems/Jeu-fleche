<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Arrow Drop 🎯</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#111118;
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; font-family:'Fredoka One',cursive;
    overflow:hidden; touch-action:none;
  }
  #gw {
    position:relative;
    width:min(400px,100vw); height:min(700px,100vh);
    background:#28283a; border-radius:24px; overflow:hidden;
    box-shadow:0 0 80px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.06);
  }
  canvas { display:block; width:100%; height:100%; }

  /* HUD */
  #hud {
    position:absolute; top:0; left:0; right:0;
    padding:14px 18px 0;
    display:flex; justify-content:space-between; align-items:center;
    z-index:5; pointer-events:none;
  }
  .hbox {
    background:rgba(0,0,0,0.45); border:1px solid rgba(255,255,255,0.07);
    border-radius:12px; padding:5px 14px; text-align:center; min-width:70px;
  }
  .hlabel { font-family:'Nunito',sans-serif; font-size:9px; color:rgba(255,255,255,0.35); text-transform:uppercase; letter-spacing:1.5px; }
  .hval { font-size:22px; color:#f0ece0; line-height:1; }
  #level-badge { color:#f0c040; font-size:18px; }

  /* Gap size indicator */
  #gap-bar-wrap {
    position:absolute; top:78px; left:18px; right:18px;
    z-index:5; pointer-events:none;
  }
  .gap-bar-label { font-family:'Nunito',sans-serif; font-size:10px; color:rgba(255,255,255,0.3); margin-bottom:3px; display:flex; justify-content:space-between; }
  .gap-bar-bg { background:rgba(255,255,255,0.08); border-radius:6px; height:6px; overflow:hidden; }
  .gap-bar-fill { height:100%; border-radius:6px; background:linear-gradient(90deg,#f0c040,#e05020); transition:width 0.5s; }

  /* Screens */
  .screen {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:10; border-radius:24px;
    transition:opacity 0.35s;
  }
  .screen.hidden { opacity:0; pointer-events:none; }
  #start-screen { background:linear-gradient(160deg,#0e0e1c,#1a1028,#0c180e); }
  #over-screen  { background:linear-gradient(160deg,rgba(25,5,5,0.97),rgba(15,5,25,0.97)); }

  #start-screen h1 {
    font-size:54px; color:#f0c040;
    text-shadow:0 4px 0 #9e6a00, 0 10px 30px rgba(240,192,64,0.35);
    letter-spacing:2px; margin-bottom:6px;
    animation:pulse 2s ease-in-out infinite;
  }
  .sub { font-family:'Nunito',sans-serif; color:rgba(255,255,255,0.5); font-size:15px; margin-bottom:44px; }
  .deco { font-size:76px; margin-bottom:26px; animation:bob 1.8s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }

  .btn {
    font-family:'Fredoka One',cursive; font-size:22px;
    padding:15px 52px; border:none; border-radius:50px;
    cursor:pointer; letter-spacing:1px;
    transition:transform .12s, box-shadow .12s;
  }
  .btn:active { transform:scale(0.94)!important; }
  .btn-gold {
    background:linear-gradient(135deg,#f0c040,#e07018);
    color:#1a1008;
    box-shadow:0 6px 0 #9e5800, 0 10px 30px rgba(240,160,40,0.3);
  }
  .btn-gold:hover { transform:translateY(-2px); box-shadow:0 9px 0 #9e5800, 0 14px 36px rgba(240,160,40,0.4); }
  .btn-ghost {
    background:rgba(255,255,255,0.07); color:#ccc;
    border:1.5px solid rgba(255,255,255,0.15);
    box-shadow:0 4px 0 rgba(0,0,0,0.3); margin-top:12px; font-size:18px;
  }

  #over-screen h2 { font-size:46px; color:#e03030; text-shadow:0 4px 0 #700; margin-bottom:6px; }
  .emoji-big { font-size:72px; margin-bottom:14px; }
  .stats {
    background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.09);
    border-radius:18px; padding:22px 44px; margin:18px 0 28px; text-align:center;
  }
  .slab { color:rgba(255,255,255,0.45); font-size:13px; font-family:'Nunito',sans-serif; margin-top:8px; }
  .sval { color:#f0ece0; font-size:34px; }

  /* Particles */
  #particles { position:absolute; inset:0; pointer-events:none; z-index:8; overflow:hidden; }
  .pt {
    position:absolute; border-radius:50%;
    animation:ptfly var(--dur) ease-out forwards;
  }
  @keyframes ptfly {
    0%   { transform:translate(0,0) scale(1); opacity:1; }
    100% { transform:translate(var(--dx),var(--dy)) scale(0); opacity:0; }
  }
  .toast {
    position:absolute; left:50%; white-space:nowrap;
    font-size:26px; color:#fff; pointer-events:none; z-index:9;
    text-shadow:0 2px 10px rgba(0,0,0,0.9);
    animation:tpop .9s ease-out forwards;
  }
  @keyframes tpop {
    0%   { transform:translateX(-50%) scale(.5); opacity:1; }
    60%  { transform:translateX(-50%) scale(1.08); opacity:1; }
    100% { transform:translateX(-50%) translateY(-44px) scale(.8); opacity:0; }
  }

  /* Tap hint */
  #hint {
    position:absolute; bottom:24px; left:50%; transform:translateX(-50%);
    font-family:'Nunito',sans-serif; font-size:13px;
    color:rgba(255,255,255,0.25); pointer-events:none; z-index:5;
    animation:hpulse 2.2s ease-in-out infinite;
  }
  @keyframes hpulse { 0%,100%{opacity:.25} 50%{opacity:.55} }
</style>
</head>
<body>
<div id="gw">
  <div id="particles"></div>

  <div id="hud">
    <div class="hbox">
      <div class="hlabel">Niveau</div>
      <div class="hval" id="level-badge">1</div>
    </div>
    <div class="hbox">
      <div class="hlabel">Score</div>
      <div class="hval" id="score-badge">0</div>
    </div>
    <div class="hbox">
      <div class="hlabel">Record</div>
      <div class="hval" id="best-badge">0</div>
    </div>
  </div>

  <div id="gap-bar-wrap">
    <div class="gap-bar-label"><span>Trou</span><span id="gap-pct">100%</span></div>
    <div class="gap-bar-bg"><div class="gap-bar-fill" id="gap-bar" style="width:100%"></div></div>
  </div>

  <canvas id="canvas"></canvas>
  <div id="hint">👆 Appuie pour lâcher</div>

  <!-- START -->
  <div class="screen" id="start-screen">
    <div class="deco">🏹</div>
    <h1>ARROW DROP</h1>
    <div class="sub">Passe dans le trou… si tu peux !</div>
    <button class="btn btn-gold" onclick="startGame()">JOUER</button>
    <button class="btn btn-ghost" onclick="howTo()">Comment jouer ?</button>
  </div>

  <!-- GAME OVER -->
  <div class="screen hidden" id="over-screen">
    <div class="emoji-big">💀</div>
    <h2>RATÉ !</h2>
    <div class="stats">
      <div class="slab">Niveau atteint</div>
      <div class="sval" id="final-level">1</div>
      <div class="slab">Score</div>
      <div class="sval" id="final-score">0</div>
      <div class="slab">Record</div>
      <div class="sval" id="final-best">0</div>
    </div>
    <button class="btn btn-gold" onclick="startGame()">REJOUER</button>
    <button class="btn btn-ghost" onclick="showStart()">Accueil</button>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const gw     = document.getElementById('gw');
const ptCont = document.getElementById('particles');

let W, H;

// ── State ──────────────────────────────────────────────────────────
let gameState = 'idle'; // idle | playing | dead
let score = 0;
let best  = +localStorage.getItem('arrowBest') || 0;
let level = 1;

// Arrow that oscillates horizontally
let swing = { x:0, y:0, vx:0 };

// Arrow in flight
let shot = null;      // { x, y, vy }
let shotDone = false; // result computed

// Board
const BOARD_Y_RATIO = 0.62;
let boardY = 0;
const BOARD_H = 26;

// Gap (single hole)
let gap = { x:0, w:0 };  // x = left edge, w = width

// Arrows stuck in board (misses — visual only)
let stuck = [];

// Flash feedback
let flash = { color:'', alpha:0 };

// Level transition flag
let transitioning = false;
let waitingForNext = false; // arrow passed, waiting to reset

// ── Level config ───────────────────────────────────────────────────
// gapW: hole width in px (board is ~W-60 wide)
// speed: swing speed px/frame
// Starts moderate, gets brutal fast
function levelConfig(lvl) {
  // Gap shrinks from 90px → ~22px over 20 levels
  const maxGap = 90;
  const minGap = 22;
  const gapW   = Math.max(minGap, maxGap - (lvl - 1) * 3.6);

  // Speed: starts at 3.5, goes up to 10
  const speed = Math.min(10, 3.5 + (lvl - 1) * 0.38);

  return { gapW, speed };
}

// ── Resize ─────────────────────────────────────────────────────────
function resize() {
  const r = gw.getBoundingClientRect();
  W = canvas.width  = r.width;
  H = canvas.height = r.height;
  if (gameState === 'playing') initLevel(false);
}

// ── Init level ─────────────────────────────────────────────────────
function initLevel(resetSwing = true) {
  const cfg = levelConfig(level);
  boardY = H * BOARD_Y_RATIO;

  // Place gap randomly but not too close to edges
  const margin = 30;
  const maxLeft = W - margin - cfg.gapW;
  gap.w = cfg.gapW;
  gap.x = margin + Math.random() * (maxLeft - margin);

  if (resetSwing) {
    swing.y = H * 0.18;
    swing.x = 30;
    swing.vx = cfg.speed;
    shot       = null;
    shotDone   = false;
    stuck      = [];
  }
  transitioning = false;
  waitingForNext = false;

  updateHUD();
  updateGapBar();
}

function updateGapBar() {
  const cfg = levelConfig(level);
  // max possible gap at level 1
  const pct = Math.round((cfg.gapW / 90) * 100);
  document.getElementById('gap-pct').textContent = pct + '%';
  document.getElementById('gap-bar').style.width  = pct + '%';
}

// ── Draw helpers ───────────────────────────────────────────────────
function drawBg() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#2e2e42');
  g.addColorStop(0.55, '#252535');
  g.addColorStop(1, '#1c1c2c');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Subtle stone lines
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.018)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 10; i++) {
    const x = 25 + i * 38;
    ctx.beginPath(); ctx.moveTo(x, 80); ctx.lineTo(x + 14, H - 60); ctx.stroke();
  }
  ctx.restore();
}

// Draw vertical arrow (tip at bottom, feathers at top)
// cx, cy = center; alpha, scale optional
function drawArrow(cx, cy, alpha=1, sc=1, dimmed=false) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(cx, cy);
  ctx.scale(sc, sc);

  const L = 56; // total length
  const hw = 4.5; // shaft half-width

  // Shaft
  const sg = ctx.createLinearGradient(-hw, 0, hw, 0);
  sg.addColorStop(0, '#b0b0b0');
  sg.addColorStop(0.5, '#f0f0f0');
  sg.addColorStop(1, '#888');
  ctx.fillStyle = sg;
  ctx.fillRect(-hw, -L/2, hw*2, L);

  // Tip (bottom)
  ctx.fillStyle = dimmed ? '#a08020' : '#f0c040';
  ctx.strokeStyle = dimmed ? '#705010' : '#c89000';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(0, L/2 + 14);   // point
  ctx.lineTo(9, L/2 - 4);
  ctx.lineTo(-9, L/2 - 4);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Feathers (top)
  ctx.fillStyle = dimmed ? '#a08020' : '#f0c040';
  ctx.strokeStyle = dimmed ? '#705010' : '#c89000';
  ctx.lineWidth = 1;
  // Left
  ctx.beginPath();
  ctx.moveTo(0, -L/2);
  ctx.lineTo(-13, -L/2 + 18);
  ctx.lineTo(-4, -L/2 + 8);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // Right
  ctx.beginPath();
  ctx.moveTo(0, -L/2);
  ctx.lineTo(13, -L/2 + 18);
  ctx.lineTo(4, -L/2 + 8);
  ctx.closePath(); ctx.fill(); ctx.stroke();

  // Notch
  ctx.fillStyle = '#777';
  ctx.fillRect(-3.5, -L/2 - 2, 7, 7);

  ctx.restore();
}

function drawBoard() {
  // Left piece: from 0 to gap.x
  // Right piece: from gap.x+gap.w to W
  const by = boardY;
  const bh = BOARD_H;

  const pieces = [
    { from: 0,            to: gap.x },
    { from: gap.x + gap.w, to: W }
  ];

  ctx.save();
  for (const p of pieces) {
    if (p.to <= p.from) continue;
    const pw = p.to - p.from;

    // Wood gradient
    const wg = ctx.createLinearGradient(0, by, 0, by + bh);
    wg.addColorStop(0, '#d49030');
    wg.addColorStop(0.4, '#c07820');
    wg.addColorStop(1, '#7a4c10');
    ctx.fillStyle = wg;
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur  = 10;
    ctx.shadowOffsetY = 5;
    ctx.beginPath();
    ctx.roundRect(p.from, by, pw, bh, 3);
    ctx.fill();
    ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

    // Top highlight
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(p.from, by, pw, 3);

    // Grain
    ctx.strokeStyle = 'rgba(0,0,0,0.1)';
    ctx.lineWidth = 1;
    for (let gx = p.from + 16; gx < p.to; gx += 18) {
      ctx.beginPath(); ctx.moveTo(gx, by + 4); ctx.lineTo(gx, by + bh - 4); ctx.stroke();
    }
  }
  ctx.restore();

  // Gap glow + arrow hint below
  const gcx = gap.x + gap.w / 2;
  const ggrd = ctx.createRadialGradient(gcx, by + bh/2, 0, gcx, by + bh/2, gap.w * 0.9);
  ggrd.addColorStop(0, 'rgba(120,210,255,0.09)');
  ggrd.addColorStop(1, 'transparent');
  ctx.fillStyle = ggrd;
  ctx.fillRect(gap.x, by - 30, gap.w, bh + 60);

  // Gap width indicator lines
  ctx.save();
  ctx.strokeStyle = 'rgba(255,200,50,0.3)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([3, 5]);
  ctx.beginPath(); ctx.moveTo(gap.x, by - 10); ctx.lineTo(gap.x, by + bh + 10); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(gap.x + gap.w, by - 10); ctx.lineTo(gap.x + gap.w, by + bh + 10); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawSwingArrow() {
  if (shot) return;
  const ax = swing.x, ay = swing.y;

  // Dashed drop line
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth = 1.2;
  ctx.setLineDash([5, 9]);
  ctx.beginPath();
  ctx.moveTo(ax, ay + 34);
  ctx.lineTo(ax, boardY - 4);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  drawArrow(ax, ay);
}

function drawShotArrow() {
  if (!shot) return;
  drawArrow(shot.x, shot.y);
}

function drawStuck() {
  for (const a of stuck) {
    // stuck horizontally in board, dimmed, rotated 180° (tip up into board)
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.rotate(Math.PI);
    ctx.scale(0.78, 0.78);
    ctx.globalAlpha = 0.7;
    drawArrow(0, 0, 1, 1, true);
    ctx.restore();
  }
}

function drawFlash() {
  if (flash.alpha <= 0) return;
  ctx.fillStyle = flash.color.replace(')', `,${flash.alpha})`).replace('rgb', 'rgba');
  ctx.fillRect(0, 0, W, H);
}

// ── Level label overlay ─────────────────────────────────────────────
let levelFlash = 0;
function drawLevelFlash() {
  if (levelFlash <= 0) return;
  const a = Math.min(1, levelFlash / 40);
  ctx.save();
  ctx.globalAlpha = a;
  ctx.font = 'bold 52px Fredoka One';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#f0c040';
  ctx.shadowColor = '#f0c040';
  ctx.shadowBlur = 30;
  ctx.fillText(`NIVEAU ${level}`, W/2, H/2);
  ctx.restore();
  levelFlash--;
}

// ── HUD ─────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('level-badge').textContent = level;
  document.getElementById('score-badge').textContent = score;
  document.getElementById('best-badge').textContent  = best;
}

// ── Game loop ────────────────────────────────────────────────────────
function update() {
  if (gameState !== 'playing') return;

  // Swing
  if (!shot && !transitioning) {
    swing.x += swing.vx;
    if (swing.x > W - 28) { swing.x = W - 28; swing.vx *= -1; }
    if (swing.x < 28)     { swing.x = 28;      swing.vx *= -1; }
  }

  // Shot arrow falling
  if (shot) {
    shot.y += shot.vy;
    shot.vy = Math.min(shot.vy + 0.3, 14); // slight gravity

    if (!shotDone && shot.y >= boardY - 10) {
      resolveShot();
    }
    // If arrow passed through (transitioning), trigger next level quickly
    if (transitioning && shot.y > boardY + 80) {
      shot = null;
      if (gameState === 'playing') nextShot();
    } else if (shot && shot.y > H + 80) {
      shot = null;
    }
  }

  // Flash fade
  if (flash.alpha > 0) flash.alpha = Math.max(0, flash.alpha - 0.025);
}

function resolveShot() {
  shotDone = true;
  const ax = shot.x;
  const inGap = ax > gap.x + 8 && ax < gap.x + gap.w - 8;

  if (inGap) {
    // ✅ Pass!
    flash = { color:'rgb(0,200,80)', alpha:0.18 };
    score += 100 + (level - 1) * 30;
    if (score > best) { best = score; localStorage.setItem('arrowBest', best); }
    updateHUD();
    spawnParticles(ax, boardY, '#f0c040', 14);
    toast('✅ Dans le mille !', boardY - 50);

    // Level up after arrow clears board
    transitioning = true;
    // arrow continues to fall naturally, we level-up when it exits screen
  } else {
    // ❌ Miss = game over
    flash = { color:'rgb(220,40,40)', alpha:0.28 };
    stuck.push({ x: ax, y: boardY + 14 });
    toast('❌ Raté !', boardY - 50);
    spawnParticles(ax, boardY, '#e03030', 10);
    setTimeout(() => endGame(), 700);
  }
}

function nextShot() {
  // Called after a successful arrow falls through
  level++;
  levelFlash = 55;
  score += 50; // bonus
  updateHUD();
  updateGapBar();

  const cfg = levelConfig(level);
  // Place new gap
  const margin = 30;
  const maxLeft = W - margin - cfg.gapW;
  gap.w = cfg.gapW;
  gap.x = margin + Math.random() * (maxLeft - margin);

  // Reset swing
  swing.y = H * 0.18;
  swing.x = 28;
  swing.vx = cfg.speed;
  shot       = null;
  shotDone   = false;
  transitioning = false;
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBg();
  if (gameState === 'playing') {
    drawBoard();
    drawStuck();
    drawSwingArrow();
    drawShotArrow();
    drawFlash();
    drawLevelFlash();
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// ── Input ────────────────────────────────────────────────────────────
function shoot() {
  if (gameState !== 'playing' || shot || transitioning) return;
  shot = { x: swing.x, y: swing.y, vy: 8 };
  shotDone = false;
}

canvas.addEventListener('pointerdown', shoot);
canvas.addEventListener('touchstart', e => { e.preventDefault(); shoot(); }, { passive: false });
document.addEventListener('keydown', e => { if (e.code === 'Space') shoot(); });

// ── Game control ─────────────────────────────────────────────────────
function startGame() {
  score = 0; level = 1;
  gameState = 'playing';
  hideAllScreens();
  initLevel(true);
  levelFlash = 55;
  updateHUD();
  updateGapBar();
}

function endGame() {
  gameState = 'dead';
  document.getElementById('final-level').textContent = level;
  document.getElementById('final-score').textContent = score;
  document.getElementById('final-best').textContent  = best;
  showScreen('over-screen');
}

function showStart() {
  gameState = 'idle';
  showScreen('start-screen');
}

function hideAllScreens() {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
}
function showScreen(id) {
  hideAllScreens();
  document.getElementById(id).classList.remove('hidden');
}

function howTo() {
  alert("🏹 Comment jouer :\n\nUne flèche (verticale, pointe en bas) se déplace de gauche à droite.\n\nAppuie / clique pour la lâcher — elle doit tomber dans le trou de la planche.\n\nÀ chaque niveau le trou rétrécit et la flèche va plus vite.\n\nUN seul raté = Game Over !\nVa le plus loin possible 💪");
}

// ── Particles & Toast ─────────────────────────────────────────────────
function spawnParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const p = document.createElement('div');
    p.className = 'pt';
    const sz = 5 + Math.random() * 9;
    const ang = Math.random() * Math.PI * 2;
    const d   = 28 + Math.random() * 65;
    p.style.cssText = `width:${sz}px;height:${sz}px;background:${color};left:${x}px;top:${y}px;--dx:${Math.cos(ang)*d}px;--dy:${Math.sin(ang)*d - 25}px;--dur:${.5+Math.random()*.55}s;`;
    ptCont.appendChild(p);
    setTimeout(() => p.remove(), 1100);
  }
}

function toast(txt, yPos) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = txt;
  t.style.top = yPos + 'px';
  gw.appendChild(t);
  setTimeout(() => t.remove(), 950);
}

// ── Init ──────────────────────────────────────────────────────────────
new ResizeObserver(resize).observe(gw);
resize();
